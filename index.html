<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWMY</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css">
<script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
<style>
  :root{
    --bg:#f2f2f2;
    --border:#d5d5d5;
    --text:#222;
    --muted:#8a8a8a;
    --accent:#4a7fe8;
    --accent-contrast:#ffffff;
    --accent-faint:#4a7fe822;
    --accent-faint2:#4a7fe814;
    --shadow:#d8d8d8;
    --shadow-a:#00000022;
    --danger:#c0504d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:13px;}
  button{font:inherit;cursor:pointer;background:var(--bg);border:1px solid var(--border);
    border-radius:0;padding:2px 6px;color:var(--text);}
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.primary{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent);}
  input,select{font:inherit;border:1px solid var(--border);border-radius:0;padding:2px 4px;background:var(--bg);color:var(--text);}

  .no-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
  .no-scrollbar::-webkit-scrollbar{display:none;width:0;height:0;}

  /* ---------- top bar ---------- */
  #topbar{display:flex;align-items:stretch;gap:0;height:32px;padding:0;background:var(--bg);
    border-bottom:1px solid var(--border);}
  #topbar .title{display:flex;align-items:center;font-weight:700;letter-spacing:.5px;margin-right:auto;padding:0 10px;}
  #topbar button{height:100%;margin:0;border:none;border-left:1px solid var(--border);border-radius:0;
    padding:0 12px;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  #topbar button:hover{background:var(--accent-faint2);color:var(--accent);}

  /* ---------- app / columns ---------- */
  #app{display:flex;height:calc(100% - 33px);overflow-x:auto;}
  .column{flex:1 1 300px;min-width:260px;max-width:420px;display:flex;flex-direction:column;
    border-right:1px solid var(--border);background:var(--bg);min-height:0;}
  .col-header{display:flex;align-items:stretch;gap:0;height:28px;padding:0;
    border-bottom:1px solid var(--border);flex:0 0 auto;}
  .col-header .col-name{font-weight:700;flex:0 0 auto;font-size:11px;color:var(--muted);
    display:flex;align-items:center;padding:0 6px;}
  .col-header .col-focus{flex:1 1 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .col-header button{height:100%;margin:0;border:none;border-left:1px solid var(--border);border-radius:0;
    padding:0 6px;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .col-header button:hover{background:var(--accent-faint2);color:var(--accent);}

  .backlog{flex:0 0 auto;max-height:110px;overflow-y:auto;border-bottom:1px solid var(--border);
    padding:3px 8px;background:var(--shadow);}
  .backlog.empty{display:none;}
  .backlog-label{font-size:10px;color:var(--muted);padding:2px 0 3px;text-transform:uppercase;letter-spacing:.5px;}

  .mainview{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .mainview .toolbar{flex:0 0 auto;}
  .mainview .toolbar button{width:100%;height:100%;margin:0;border:none;border-bottom:1px solid var(--border);
    border-radius:0;padding:6px 8px;font-size:11px;background:var(--bg);}
  .mainview .toolbar button:hover{background:var(--accent-faint2);color:var(--accent);}
  .cell-list{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow-y:auto;
    scrollbar-width:none;-ms-overflow-style:none;}
  .cell-list::-webkit-scrollbar{display:none;width:0;height:0;}

  .currentperiod{flex:0 0 25%;overflow-y:auto;border-top:1px solid var(--border);
    padding:3px 8px;display:flex;flex-direction:column;}
  .cp-label{font-size:10px;color:var(--muted);padding:2px 0 3px;text-transform:uppercase;letter-spacing:.5px;flex:0 0 auto;}

  /* ---------- generic row/cell ---------- */
  .cell{flex:0 0 auto;min-height:0;display:flex;flex-direction:column;
    border-bottom:1px solid var(--border);padding:2px 8px;background:transparent;}
  .cell:last-child{border-bottom:none;}
  .cell.current{background:var(--accent-faint);}
  .cell .cell-label{font-size:10px;color:var(--muted);flex:0 0 auto;display:flex;gap:6px;}
  .cell .cell-label.clickable{cursor:pointer;}
  .cell .cell-label.clickable:hover{color:var(--accent);text-decoration:underline;}
  .cell-blank{flex:1 1 auto;min-height:14px;cursor:text;}
  .cell.week-boundary{border-top:2px solid var(--accent);}

  .life-loadmore{flex:0 0 auto;width:100%;margin:0;border:none;border-bottom:1px solid var(--border);
    border-radius:0;padding:6px 8px;font-size:11px;background:var(--bg);}
  .life-loadmore:hover{background:var(--accent-faint2);color:var(--accent);}

  /* ---------- item ---------- */
  .item{display:flex;align-items:flex-start;gap:5px;padding:1px 2px;border-radius:3px;position:relative;flex:0 0 auto;}
  .item:hover{background:var(--accent-faint2);}
  .item .cb{flex:0 0 auto;width:16px;height:16px;margin-top:1px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .item[data-state="started"] .cb{color:var(--accent);}
  .item[data-state="done"] .cb{color:var(--accent);}
  .item[data-state="done"] .title{text-decoration:line-through;color:var(--muted);}
  .item[data-state="canceled"] .cb{color:var(--text);opacity:.45;}
  .item[data-state="canceled"] .title{text-decoration:line-through;color:var(--muted);font-style:italic;}
  .item.event .cb{cursor:default;color:var(--muted);}
  .item .date-badge{flex:0 0 auto;font-size:10px;color:var(--accent);margin-top:2px;}
  .item .title{flex:1 1 auto;word-break:break-word;line-height:1.35;}
  .item .title strong{font-weight:700;}
  .item .title em{font-style:italic;}
  .item .title mark{background:var(--accent-faint);color:inherit;padding:0 1px;border-radius:2px;}
  .item .title a{color:var(--accent);text-decoration:underline;}
  .item .time{font-size:10px;color:var(--muted);flex:0 0 auto;margin-top:2px;}
  .item .menu-btn{flex:0 0 auto;opacity:.35;font-size:12px;color:var(--muted);padding:0 3px;border:none;background:none;}
  .item:hover .menu-btn, .item .menu-btn.open{opacity:1;}
  .item .menu-btn:hover{color:var(--accent);}
  .item .parent-btn{flex:0 0 auto;border:none;background:none;padding:0;margin-top:2px;
    color:var(--muted);cursor:pointer;display:flex;align-items:center;}
  .item .parent-btn:hover{color:var(--accent);}
  .item .parent-btn .lucide{width:12px;height:12px;}
  .item .child-badge{flex:0 0 auto;border:none;background:none;color:var(--accent);font-size:10px;
    font-weight:700;padding:1px 3px;margin-top:1px;cursor:pointer;min-width:14px;text-align:center;}
  .item .child-badge:hover{text-decoration:underline;}
  .item .unlink-btn{flex:0 0 auto;opacity:.4;border:none;background:none;color:var(--muted);
    padding:0 3px;display:flex;align-items:center;cursor:pointer;}
  .item .unlink-btn:hover{opacity:1;color:var(--danger);}
  .item .unlink-btn .lucide{width:13px;height:13px;}

  .item-menu .mi.icon-mi{display:flex;align-items:center;gap:6px;}
  .item-menu .mi.icon-mi .lucide{width:13px;height:13px;color:var(--muted);flex:0 0 auto;}

  .subtask-panel{position:fixed;background:var(--bg);border:1px solid var(--border);border-radius:6px;
    box-shadow:0 4px 16px var(--shadow-a);z-index:1000;min-width:250px;max-width:300px;max-height:360px;
    overflow-y:auto;padding:2px 8px 6px;}
  .subtask-panel-header{font-size:11px;color:var(--muted);padding:6px 2px;border-bottom:1px solid var(--border);
    margin-bottom:2px;}
  .subtask-panel-empty{padding:8px 2px;font-size:12px;color:var(--muted);}

  /* ---------- 反面：Someday / list 瀑布流 ---------- */
  .someday-col{flex:1 1 300px;margin-right:-0.5px;}
  .someday-body{flex:1 1 auto;overflow-y:auto;padding:4px 8px;display:flex;flex-direction:column;
    scrollbar-width:none;-ms-overflow-style:none;}
  .someday-body::-webkit-scrollbar{display:none;width:0;height:0;}

  .masonry-col{flex:1 1 300px;min-width:260px;max-width:420px;display:flex;flex-direction:column;
    padding:0;gap:0;overflow-y:auto;min-height:0;
    scrollbar-width:none;-ms-overflow-style:none;}
  .masonry-col::-webkit-scrollbar{display:none;width:0;height:0;}

  .list-card{border:1px solid var(--border);margin:-1px -0.5px 0px -0.5px ;background:var(--bg);display:flex;flex-direction:column;flex:0 0 auto;}
  .list-card-header{display:flex;align-items:stretch;gap:0;height:28px;padding:0 0 0 8px;
    border-bottom:1px solid var(--border);}
  .list-name{font-weight:700;font-size:12px;cursor:pointer;flex:1 1 auto;display:flex;align-items:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .list-name-input{flex:1 1 auto;font-weight:700;font-size:12px;margin:0;border:none;border-bottom:1px solid var(--accent);}
  .list-card-actions{display:flex;flex:0 0 auto;}
  .list-card-actions button{height:100%;border:none;border-left:1px solid var(--border);background:var(--bg);
    padding:0 6px;color:var(--muted);border-radius:0;margin:0;display:flex;align-items:center;justify-content:center;}
  .list-card-actions button:hover{background:var(--accent-faint2);color:var(--accent);}
  .list-card-actions .lucide{width:13px;height:13px;}
  .list-card-body{padding:2px 8px 4px;display:flex;flex-direction:column;}

  .add-list-btn{width:100%;border:1px dashed var(--border);margin:-0.5px;background:transparent;padding:4px 8px;
    font-size:11px;color:var(--muted);border-radius:0;}
  .add-list-btn:hover{color:var(--accent);}

  .hash-badge{flex:0 0 auto;border:none;background:none;color:var(--accent);padding:0 2px;margin-top:2px;
    cursor:pointer;display:flex;align-items:center;}
  .hash-badge:hover{opacity:.7;}
  .hash-badge .lucide{width:13px;height:13px;}

  @keyframes flash-bg{0%{background:var(--accent-faint);}100%{background:transparent;}}
  .flash-highlight{animation:flash-bg 1.6s ease;}

  .search-results{max-height:240px;overflow-y:auto;margin:8px 0;border:1px solid var(--border);}
  .search-result-row{display:flex;align-items:center;gap:6px;padding:4px 6px;font-size:13px;border-bottom:1px solid var(--border);}
  .search-result-row:last-child{border-bottom:none;}

  /* ---------- 折角翻页按钮 ---------- */
  #flipBtn{position:fixed;right:0;bottom:0;width:34px;height:34px;cursor:pointer;z-index:1500;}
  #flipBtn .tri-a{position:absolute;inset:0;background:var(--bg);border:1px solid var(--border);
    clip-path:polygon(0 0,100% 0,0 100%);}
  #flipBtn .tri-b{position:absolute;inset:0;background:var(--text);
    clip-path:polygon(100% 0,100% 100%,0 100%);}
  #flipBtn:hover{opacity:.85;}

  .lucide{width:14px;height:14px;stroke-width:2;vertical-align:middle;display:block;}

  /* ---------- inline create ---------- */
  .inline-create{display:flex;align-items:flex-start;gap:4px;flex:0 0 auto;padding:2px 0;}
  .inline-create textarea.ic-title{flex:1 1 auto;border:none;border-bottom:1px solid var(--accent);
    border-radius:0;background:transparent;padding:2px 0;font:inherit;color:var(--text);
    resize:none;overflow:hidden;min-height:1.4em;line-height:1.4;}
  .inline-create textarea.ic-title:focus{outline:none;}
  .inline-create .ic-time-btn{flex:0 0 auto;padding:2px 4px;border:none;background:none;
    display:flex;align-items:center;justify-content:center;color:var(--muted);margin-top:2px;}
  .inline-create .ic-time-btn:hover{color:var(--accent);}
  .inline-create input[type=time]{flex:0 0 auto;font-size:11px;padding:1px 3px;margin-top:2px;}

  .item-menu{position:fixed;background:var(--bg);border:1px solid var(--border);border-radius:6px;
    box-shadow:0 4px 16px var(--shadow-a);z-index:1000;min-width:150px;overflow:hidden;}
  .item-menu .mi{padding:6px 10px;font-size:12px;}
  .item-menu .mi:hover{background:var(--accent-faint);}
  .item-menu hr{border:none;border-top:1px solid var(--border);margin:2px 0;}

  /* ---------- modal ---------- */
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;
    justify-content:center;z-index:2000;}
  .modal{background:var(--bg);border-radius:8px;padding:16px;min-width:300px;max-width:90vw;
    box-shadow:0 10px 40px var(--shadow-a);}
  .modal .row .color-swatch{width:36px;height:22px;padding:0;border:1px solid var(--border);cursor:pointer;}
  .theme-io-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .theme-io-row .lucide{width:14px;height:14px;color:var(--muted);flex:0 0 auto;}
  .theme-io-row button{flex:1 1 0;font-size:12px;}
  .modal h3{margin:0 0 10px;font-size:14px;}
  .modal .row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .modal .row label{flex:0 0 80px;color:var(--muted);font-size:12px;}
  .modal .row input,.modal .row select{flex:1 1 auto;}
  .modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

  /* ========================================================
     移动端适配
  ======================================================== */
  #bottombar{display:none;position:fixed;left:0;right:0;bottom:0;height:50px;background:var(--bg);
    border-top:1px solid var(--border);z-index:1600;align-items:stretch;
    padding-bottom:env(safe-area-inset-bottom);}
  #bottombar button{flex:1 1 0;height:100%;margin:0;border:none;border-left:1px solid var(--border);
    border-radius:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;font-size:9px;color:var(--muted);padding:0;}
  #bottombar button:first-child{border-left:none;}
  #bottombar button.active{color:var(--accent);}
  #bottombar button .lucide{width:18px;height:18px;}

  #btnSync .lucide{transition:none;}
  #btnSync.spinning .lucide{animation:dwmy-spin .8s linear infinite;}
  @keyframes dwmy-spin{to{transform:rotate(360deg);}}

  body.is-mobile #bottombar{display:flex;}
  body.is-mobile #app{padding-bottom:50px;}
  body.is-mobile #topbar{padding-right:32px;position:relative;}
  body.is-mobile #flipBtn{position:absolute;left:auto;right:0;top:0;bottom:auto;width:32px;height:32px;}
  body.is-mobile #flipBtn .tri-a{clip-path:polygon(0 0,0 100%,100% 100%);}
  body.is-mobile #flipBtn .tri-b{clip-path:polygon(0 0,100% 0,100% 100%);}

  /* 一屏一栏：靠 scroll-snap，底部图标/左右滑动都能切换 */
  body.is-mobile #app{scroll-snap-type:x mandatory;}
  body.is-mobile .column{flex:0 0 100%;max-width:100%;min-width:100%;scroll-snap-align:start;}
  body.is-mobile .someday-col{flex:0 0 100%;max-width:100%;min-width:100%;scroll-snap-align:start;margin-right:0;}
  body.is-mobile .masonry-col{flex:0 0 100%;max-width:100%;min-width:100%;scroll-snap-align:start;}

  /* 底部弹出的操作菜单（bottom sheet），替代跟随按钮定位的 item-menu/subtask-panel，避免小屏溢出、避免和拖拽手势冲突 */
  .sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1900;}
  .bottom-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--border);
    border-radius:12px 12px 0 0;box-shadow:0 -4px 16px var(--shadow-a);z-index:2000;
    max-height:70vh;overflow-y:auto;padding:4px 0 max(8px,env(safe-area-inset-bottom));}
  .bottom-sheet .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:6px auto 8px;}
  .bottom-sheet .mi{padding:12px 16px;font-size:14px;}
  .bottom-sheet .mi.icon-mi{display:flex;align-items:center;gap:10px;}
  .bottom-sheet .mi.icon-mi .lucide{width:16px;height:16px;color:var(--muted);flex:0 0 auto;}
  .bottom-sheet .mi:active{background:var(--accent-faint);}
  .bottom-sheet hr{border:none;border-top:1px solid var(--border);margin:2px 0;}
  .bottom-sheet .subtask-panel-header{padding:4px 16px 10px;}
  .bottom-sheet .subtask-panel-empty{padding:8px 16px;font-size:12px;color:var(--muted);}
</style>
</head>
<body>

<div id="topbar">
  <div class="title">DWMY</div>
  <button id="btnExport" title="导出"></button>
  <button id="btnImport" title="导入"></button>
  <input type="file" id="fileImport" accept="application/json" style="display:none;">
  <button id="btnSync" title="立即同步" style="display:none;"></button>
  <button id="btnSettings" title="设置"></button>
</div>

<div id="app"></div>
<div id="flipBtn" title="翻到反面/正面">
  <div class="tri-a"></div>
  <div class="tri-b"></div>
</div>
<div id="bottombar"></div>

<script>
/* =========================================================
   工具函数：日期
========================================================= */
function pad2(n){return String(n).padStart(2,'0');}
function keyFromDate(d){return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;}
function dateFromKey(key){
  const [y,m,d]=key.split('-').map(Number);
  return new Date(y,(m||1)-1,d||1);
}
function todayKey(){return keyFromDate(new Date());}
function addDays(key,n){const d=dateFromKey(key);d.setDate(d.getDate()+n);return keyFromDate(d);}
function addMonths(monthKey,n){
  let [y,m]=monthKey.split('-').map(Number);
  m+=n;
  while(m>12){m-=12;y++;}
  while(m<1){m+=12;y--;}
  return `${y}-${pad2(m)}`;
}
function monthKeyOf(dateKey){return dateKey.slice(0,7);}
function yearKeyOf(dateKey){return dateKey.slice(0,4);}
function daysInMonth(monthKey){
  const [y,m]=monthKey.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function getWeekStartKey(dateKey,weekStart){
  const d=dateFromKey(dateKey);
  const day=d.getDay();
  const diff=(day-weekStart+7)%7;
  d.setDate(d.getDate()-diff);
  return keyFromDate(d);
}
function fmtMD(key){
  const [y,m,d]=key.split('-');
  const suffix = y!==yearKeyOf(todayKey()) ? '/'+y : '';
  return `${Number(m)}/${Number(d)}${suffix}`;
}
function fmtYM(key){const [y,m]=key.split('-');return `${y}年${Number(m)}月`;}
const WEEKDAY_NAMES=['日','一','二','三','四','五','六'];
const MONTH_NAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function iconEl(name){
  const i=document.createElement('i'); i.setAttribute('data-lucide',name); return i;
}
function iconButton(name,title,onClick){
  const btn=document.createElement('button'); btn.type='button'; btn.title=title;
  btn.appendChild(iconEl(name));
  btn.onclick=onClick;
  return btn;
}

/* =========================================================
   移动端检测：竖屏时宽度<=1024算移动端（含iPad竖屏），
   横屏时宽度<=768才算移动端（iPad横屏仍走桌面布局）
========================================================= */
function isMobileLayout(){
  const w=window.innerWidth, h=window.innerHeight;
  const portrait=h>=w;
  return portrait ? w<=1024 : w<=768;
}
let mobileMode=isMobileLayout();
function updateMobileClass(){
  const m=isMobileLayout();
  const changed=(m!==mobileMode);
  mobileMode=m;
  document.body.classList.toggle('is-mobile',m);
  return changed;
}

/* =========================================================
   数据层：store
========================================================= */
const STORAGE_KEY='dwmy_state_v1';

function defaultSettings(){
  return {
    weekStart:1,
    daySlots:[
      {name:'上午',start:'06:00',end:'12:00'},
      {name:'下午',start:'12:00',end:'18:00'},
      {name:'晚上',start:'18:00',end:'24:00'}
    ],
    monthView:'day', // 'day' | 'week'
    accentColor:'#4a7fe8',
    bgColor:'#f2f2f2',
    fgColor:'#222222',
    highlightOpacity:0.16,
    timeFormat:'24',
    weekShowSlots:false
  };
}
function defaultState(){
  const tk=todayKey();
  return {
    version:1,
    settings:defaultSettings(),
    items:{},
    lists:{},
    listOrder:[],
    ui:{ side:'front', focus:{ day:tk, week:tk, month:monthKeyOf(tk), year:yearKeyOf(tk), life:yearKeyOf(tk) } }
  };
}
let state=loadState();
function migrateState(s){
  if(!s.lists) s.lists={};
  if(!s.listOrder) s.listOrder=[];
  if(!s.ui) s.ui={focus:{day:todayKey(),week:todayKey(),month:monthKeyOf(todayKey()),year:yearKeyOf(todayKey()),life:yearKeyOf(todayKey())}};
  if(!s.ui.side) s.ui.side='front';
  return s;
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return seedState(defaultState());
    const parsed=JSON.parse(raw);
    if(!parsed.version) return seedState(defaultState());
    return migrateState(parsed);
  }catch(e){ console.error('load failed',e); return seedState(defaultState()); }
}
function seedState(s){
  const tk=todayKey();
  const seed=[
    {title:'欢迎使用 DWMY，点空白处新建任务',type:'task',anchor:{level:'day',date:tk,slotIndex:null,time:null}},
    {title:'今天上午的示例任务',type:'task',anchor:{level:'slot',date:tk,slotIndex:0,time:null}},
    {title:'这周要交的东西',type:'task',anchor:{level:'week',date:getWeekStartKey(tk,s.settings.weekStart),slotIndex:null,time:null}},
    {title:'本月目标示例',type:'task',anchor:{level:'month',date:monthKeyOf(tk),slotIndex:null,time:null}},
    {title:'今年计划示例',type:'task',anchor:{level:'year',date:yearKeyOf(tk),slotIndex:null,time:null}},
    {title:'人生清单示例',type:'task',anchor:{level:'life',date:null,slotIndex:null,time:null}}
  ];
  seed.forEach(it=>{

    s.items[id]=Object.assign({id,state:it.type==='task'?'todo':null,parentId:null,listIds:[],createdAt:Date.now(),updatedAt:Date.now()},it);
  });
  return s;
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){ console.error('save failed',e); }
  scheduleAutoSyncIfChanged();
}
function makeId(){return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* =========================================================
   GitHub 同步
   架构：GitHub App（user-to-server token，不过期）+ 一个 Vercel 回调函数换 token；
   之后所有同步请求前端直连 GitHub Contents API，靠文件的 sha 做冲突检测。
========================================================= */
const GITHUB_APP_SLUG='dwmy-sync';
const GITHUB_CLIENT_ID='Iv23li5w2pEFpvIzwf9Z';
const GITHUB_AUTH_ORIGIN='https://dwmy-auth.vercel.app';
const GITHUB_DATA_PATH='dwmy-data.json';
const GITHUB_CONN_KEY='dwmy_github_conn_v1';

function getGithubConn(){
  try{ const raw=localStorage.getItem(GITHUB_CONN_KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; }
}
function saveGithubConn(conn){
  try{ localStorage.setItem(GITHUB_CONN_KEY,JSON.stringify(conn)); }catch(e){ console.error('save github conn failed',e); }
}
function clearGithubConn(){
  try{ localStorage.removeItem(GITHUB_CONN_KEY); }catch(e){}
}
function isGithubConnected(){
  const c=getGithubConn();
  return !!(c && c.token && c.owner && c.repo);
}

/* base64 编解码，兼容中文等非 ASCII 字符 */
function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,(_,p1)=>String.fromCharCode('0x'+p1)));
}
function b64DecodeUnicode(str){
  return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}

async function githubApiFetch(path,opts){
  opts=opts||{};
  const conn=getGithubConn();
  const token=opts.token || (conn && conn.token);
  const headers=Object.assign({
    'Authorization':'Bearer '+token,
    'Accept':'application/vnd.github+json'
  },opts.headers||{});
  return fetch('https://api.github.com'+path,Object.assign({},opts,{headers}));
}

/* 登录：走纯授权入口（不管这个账号装没装过 App 都能用），弹窗完成后通过 postMessage 拿回 token。
   不用 /apps/{slug}/installations/new——那个是"新装"入口，账号已经装过 App 时点进去只会
   进 Configure 页面，不会产生新的 code。 */
function startGithubLogin(){
  const nonce=Math.random().toString(36).slice(2)+Date.now().toString(36);
  sessionStorage.setItem('dwmy_oauth_state',nonce);
  const url=`https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&state=${encodeURIComponent(nonce)}`;
  window.open(url,'dwmy-github-login','width=640,height=720');
}
window.addEventListener('message',(e)=>{
  if(e.origin!==GITHUB_AUTH_ORIGIN) return;
  const data=e.data;
  if(!data||data.type!=='dwmy-oauth-result') return;
  const expected=sessionStorage.getItem('dwmy_oauth_state');
  sessionStorage.removeItem('dwmy_oauth_state');
  if(!expected||data.state!==expected){ console.warn('DWMY: oauth state 不匹配，忽略这条消息'); return; }
  if(!data.ok){ alert('GitHub 登录失败：'+(data.message||'未知错误')); return; }
  handleGithubLoginSuccess(data.token);
});

/* 登录成功后：找到用户安装了这个 App 的仓库，选一个作为同步目标，然后做一次首次核对 */
async function handleGithubLoginSuccess(token){
  try{
    const resp=await githubApiFetch('/user/installations',{token});
    if(!resp.ok) throw new Error('无法获取已安装的 App 信息 ('+resp.status+')');
    const data=await resp.json();
    const installations=data.installations||[];
    if(installations.length===0){ alert('没有找到任何安装记录，请重试登录流程'); return; }

    let candidates=[];
    for(const inst of installations){
      const rr=await githubApiFetch(`/user/installations/${inst.id}/repositories`,{token});
      if(!rr.ok) continue;
      const rd=await rr.json();
      (rd.repositories||[]).forEach(repo=>{
        candidates.push({installationId:inst.id,owner:repo.owner.login,repo:repo.name,fullName:repo.full_name});
      });
    }
    if(candidates.length===0){
      const goInstall=confirm('这个 GitHub 账号还没有安装 DWMY Sync 这个 App。\n点"确定"去安装页面（选完仓库装完后，回来再点一次"连接 GitHub"就行）。');
      if(goInstall) window.open(`https://github.com/apps/${GITHUB_APP_SLUG}/installations/new`,'_blank');
      return;
    }
    let chosen;
    if(candidates.length===1){
      chosen=candidates[0];
    }else{
      const idx=promptChooseRepo(candidates);
      if(idx==null) return;
      chosen=candidates[idx];
    }
    saveGithubConn({
      token,
      installationId:chosen.installationId,
      owner:chosen.owner,
      repo:chosen.repo,
      lastSyncedSha:null,
      lastSyncedAt:null
    });
    await reconcileAfterLogin();
    const sec=document.getElementById('ghSyncSection');
    if(sec) renderGhSyncSection(sec);
    updateTopbarSyncButton();
  }catch(e){
    alert('登录处理失败：'+e.message);
  }
}
function promptChooseRepo(candidates){
  const list=candidates.map((c,i)=>(i+1)+'. '+c.fullName).join('\n');
  const input=prompt('检测到多个可用仓库，请输入序号选择用于同步的仓库：\n'+list);
  if(input==null) return null;
  const n=parseInt(input.trim(),10);
  if(!n||n<1||n>candidates.length) return null;
  return n-1;
}

/* 首次连接：远端已有数据 -> 问要不要拉取覆盖本地；远端是空的 -> 问要不要把本地推上去 */
async function reconcileAfterLogin(){
  const conn=getGithubConn();
  const resp=await githubApiFetch(`/repos/${conn.owner}/${conn.repo}/contents/${GITHUB_DATA_PATH}`);
  if(resp.status===404){
    const ok=confirm('该仓库还没有 DWMY 同步数据，是否把当前本地数据上传作为初始数据？');
    if(ok) await pushSync();
    return;
  }
  if(!resp.ok){ alert('读取远端数据失败 ('+resp.status+')'); return; }
  const data=await resp.json();
  const useRemote=confirm('该仓库已经有 DWMY 同步数据。\n点"确定"用远端数据覆盖本地，点"取消"保留本地数据（本地数据会在下次同步时推送覆盖远端）。');
  if(useRemote){
    applyRemoteContent(data);
  }else{
    conn.lastSyncedSha=data.sha;
    saveGithubConn(conn);
  }
}

function applyRemoteContent(data){
  try{
    const jsonStr=b64DecodeUnicode((data.content||'').replace(/\n/g,''));
    const remote=JSON.parse(jsonStr);
    state=remote;
    migrateState(state);
    applyTheme();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    const conn=getGithubConn();
    conn.lastSyncedSha=data.sha;
    conn.lastSyncedAt=Date.now();
    saveGithubConn(conn);
    lastSyncSignature=syncableSnapshot();
    renderAll();
  }catch(e){
    alert('解析远端数据失败：'+e.message);
  }
}

/* 自动同步：只在"实际会同步的数据"变化时才触发，导航/切换视图这类操作不算 */
let lastSyncSignature=null;
let autoSyncTimer=null;
function syncableSnapshot(){
  return JSON.stringify({items:state.items,lists:state.lists,listOrder:state.listOrder,settings:state.settings});
}
function scheduleAutoSyncIfChanged(){
  if(!isGithubConnected()) return;
  const sig=syncableSnapshot();
  if(sig===lastSyncSignature) return;
  lastSyncSignature=sig;
  clearTimeout(autoSyncTimer);
  autoSyncTimer=setTimeout(()=>{ pushSync(); },3000);
}

let syncInProgress=false;
async function pushSync(){
  if(!isGithubConnected()) return;
  if(syncInProgress) return;
  syncInProgress=true;
  try{
    const conn=getGithubConn();
    const body={
      message:'DWMY sync '+new Date().toISOString(),
      content:b64EncodeUnicode(JSON.stringify(state))
    };
    if(conn.lastSyncedSha) body.sha=conn.lastSyncedSha;
    const resp=await githubApiFetch(`/repos/${conn.owner}/${conn.repo}/contents/${GITHUB_DATA_PATH}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(resp.status===409||resp.status===422){
      await handleSyncConflict();
      return;
    }
    if(!resp.ok){ throw new Error(resp.status+' '+(await resp.text())); }
    const json=await resp.json();
    conn.lastSyncedSha=json.content.sha;
    conn.lastSyncedAt=Date.now();
    saveGithubConn(conn);
    lastSyncSignature=syncableSnapshot();
  }catch(e){
    console.error('DWMY sync failed',e);
  }finally{
    syncInProgress=false;
    const sec=document.getElementById('ghSyncSection');
    if(sec) renderGhSyncSection(sec);
  }
}

async function handleSyncConflict(){
  const conn=getGithubConn();
  const useRemote=confirm('同步冲突：远端数据已经被其它设备更新过。\n点"确定"拉取远端覆盖本地，点"取消"强制用本地覆盖远端。');
  const resp=await githubApiFetch(`/repos/${conn.owner}/${conn.repo}/contents/${GITHUB_DATA_PATH}`);
  if(!resp.ok) return;
  const remote=await resp.json();
  if(useRemote){
    applyRemoteContent(remote);
  }else{
    conn.lastSyncedSha=remote.sha;
    saveGithubConn(conn);
    await pushSync();
  }
}

function logoutGithub(){
  if(!confirm('确定要退出登录吗？本地数据不会被删除，只是不再自动同步。')) return;
  clearGithubConn();
  clearTimeout(autoSyncTimer);
  const sec=document.getElementById('ghSyncSection');
  if(sec) renderGhSyncSection(sec);
  updateTopbarSyncButton();
}

/* 顶部同步按钮：只在已连接时显示，桌面/移动端通用 */
function updateTopbarSyncButton(){
  const btn=document.getElementById('btnSync');
  if(!btn) return;
  btn.style.display = isGithubConnected() ? 'flex' : 'none';
}

/* 设置面板里的 GitHub 同步区块 */
function renderGhSyncSection(container){
  container.innerHTML='';
  const conn=getGithubConn();
  if(!conn){
    const p=document.createElement('div');
    p.style.cssText='margin-bottom:8px;color:var(--muted);font-size:12px;';
    p.textContent='尚未连接，数据只保存在本地浏览器里。';
    container.appendChild(p);
    const btn=document.createElement('button'); btn.type='button'; btn.className='primary'; btn.textContent='连接 GitHub';
    btn.onclick=()=>startGithubLogin();
    container.appendChild(btn);
  }else{
    const info=document.createElement('div');
    info.style.cssText='margin-bottom:8px;font-size:12px;line-height:1.6;';
    const lastSync=conn.lastSyncedAt?new Date(conn.lastSyncedAt).toLocaleString():'尚未同步';
    info.innerHTML=`已连接：<strong>${escapeHtml(conn.owner+'/'+conn.repo)}</strong><br>上次同步：${escapeHtml(lastSync)}`;
    container.appendChild(info);
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;';
    const syncBtn=document.createElement('button'); syncBtn.type='button'; syncBtn.textContent='立即同步';
    syncBtn.onclick=async ()=>{
      syncBtn.disabled=true; syncBtn.textContent='同步中…';
      await pushSync();
    };
    const logoutBtn=document.createElement('button'); logoutBtn.type='button'; logoutBtn.textContent='退出登录';
    logoutBtn.onclick=()=>logoutGithub();
    row.appendChild(syncBtn); row.appendChild(logoutBtn);
    container.appendChild(row);
  }
}

/* =========================================================
   任务 CRUD
========================================================= */
function addItem({title,type,level,date,slotIndex,time}){
  const id=makeId();
  state.items[id]={
    id,title,type,
    state:type==='task'?'todo':null,
    parentId:null,
    listIds:[],
    anchor:{level,date:date||null,slotIndex:(slotIndex==null?null:slotIndex),time:time||null},
    createdAt:Date.now(),updatedAt:Date.now()
  };
  saveState();
  return id;
}
function deleteItem(id){
  Object.values(state.items).forEach(it=>{ if(it.parentId===id) it.parentId=null; });
  delete state.items[id];
  saveState();
}
function cycleState(id){
  const it=state.items[id]; if(!it||it.type!=='task')return;
  const order=['todo','started','done'];
  const idx=order.indexOf(it.state);
  it.state = idx===-1 ? 'todo' : order[(idx+1)%order.length];
  it.updatedAt=Date.now(); saveState();
}
function setCanceled(id){
  const it=state.items[id]; if(!it||it.type!=='task')return;
  it.state = it.state==='canceled' ? 'todo' : 'canceled';
  it.updatedAt=Date.now(); saveState();
}
function toggleType(id){
  const it=state.items[id]; if(!it)return;
  it.type = it.type==='task' ? 'event' : 'task';
  it.state = it.type==='task' ? 'todo' : null;
  it.updatedAt=Date.now(); saveState();
}
function moveItemToAnchor(id,anchorPatch){
  const it=state.items[id]; if(!it)return;
  it.anchor=Object.assign({},it.anchor,anchorPatch);
  it.updatedAt=Date.now(); saveState();
}
function updateItemTitle(id,title,time){
  const it=state.items[id]; if(!it)return;
  it.title=title;
  it.anchor.time=time||null;
  if(it.anchor.level==='day' && time){
    const slot=findSlotForTime(time);
    if(slot!==-1){ it.anchor.level='slot'; it.anchor.slotIndex=slot; }
  }
  it.updatedAt=Date.now(); saveState();
}
function isPending(it){ return it.type==='task' && (it.state==='todo'||it.state==='started'); }

/* =========================================================
   父子任务关系（subtask）
========================================================= */
function getChildren(id){
  return Object.values(state.items).filter(it=>it.parentId===id);
}
function countChildren(id){ return getChildren(id).length; }
function getDescendantIds(id){
  const result=new Set(); const stack=[id];
  while(stack.length){
    const cur=stack.pop();
    getChildren(cur).forEach(c=>{ if(!result.has(c.id)){ result.add(c.id); stack.push(c.id); } });
  }
  return result;
}
function setParent(childId,parentId){
  if(!parentId || childId===parentId) return false;
  const child=state.items[childId]; const parent=state.items[parentId];
  if(!child||!parent) return false;
  if(getDescendantIds(childId).has(parentId)) return false; // 会形成循环引用
  child.parentId=parentId;
  child.updatedAt=Date.now();
  saveState();
  return true;
}
function unlinkFromParent(id){
  const it=state.items[id]; if(!it) return;
  it.parentId=null; it.updatedAt=Date.now(); saveState();
}
function copyAsChild(sourceId,anchorPatch){
  const src=state.items[sourceId]; if(!src) return null;
  const id=makeId();
  state.items[id]={
    id, title:src.title, type:src.type,
    state: src.type==='task' ? 'todo' : null,
    parentId: sourceId,
    anchor: Object.assign({},src.anchor,anchorPatch),
    createdAt:Date.now(), updatedAt:Date.now()
  };
  saveState();
  return id;
}
/* 跳转到某个 item 所在的列（用于"跳转到父任务"） */
function jumpToItem(id){
  const it=state.items[id]; if(!it) return;
  const a=it.anchor; const f=state.ui.focus;
  let colId='life';
  if(a.level==='slot'||a.level==='day'){ f.day=a.date; colId='day'; }
  else if(a.level==='week'){ f.week=a.date; colId='week'; }
  else if(a.level==='month'){ f.month=a.date; colId='month'; }
  else if(a.level==='year'){ f.year=a.date; colId='year'; }
  saveState();
  renderAll();
  requestAnimationFrame(()=>{
    const colEl=document.querySelector(`.column[data-col="${colId}"]`);
    if(colEl) colEl.scrollIntoView({behavior:'smooth',inline:'nearest',block:'nearest'});
  });
}
/* 子任务面板里点击 item：只让 Day 列跳转到那个时间点，面板保持打开 */
function jumpDayToItem(id){
  const it=state.items[id]; if(!it) return;
  const a=it.anchor; let dayKey=null;
  if(a.level==='slot'||a.level==='day') dayKey=a.date;
  else if(a.level==='week') dayKey=a.date;
  else if(a.level==='month') dayKey=a.date+'-01';
  else if(a.level==='year') dayKey=a.date+'-01-01';
  if(dayKey){ state.ui.focus.day=dayKey; saveState(); renderAll(); }
}

/* =========================================================
   反面：list（多对多归属）
========================================================= */
function getListsForItem(item){
  return (item.listIds||[]).map(lid=>state.lists[lid]).filter(Boolean);
}
function getItemsForList(listId){
  return Object.values(state.items).filter(it=>(it.listIds||[]).includes(listId));
}
function addItemToList(itemId,listId){
  const it=state.items[itemId]; if(!it||!state.lists[listId]) return;
  it.listIds=it.listIds||[];
  if(!it.listIds.includes(listId)) it.listIds.push(listId);
  it.updatedAt=Date.now(); saveState();
}
function removeItemFromList(itemId,listId){
  const it=state.items[itemId]; if(!it) return;
  it.listIds=(it.listIds||[]).filter(id=>id!==listId);
  it.updatedAt=Date.now(); saveState();
}
function createList(name){
  const id=makeId();
  state.lists[id]={id,name:name||'新建列表',pinned:false,createdAt:Date.now()};
  state.listOrder.push(id);
  saveState();
  return id;
}
function deleteList(id){
  Object.values(state.items).forEach(it=>{ if(it.listIds) it.listIds=it.listIds.filter(l=>l!==id); });
  delete state.lists[id];
  state.listOrder=state.listOrder.filter(l=>l!==id);
  saveState();
}
function renameList(id,name){
  const l=state.lists[id]; if(!l) return;
  l.name=name; saveState();
}
function toggleListPin(id){
  const l=state.lists[id]; if(!l) return;
  l.pinned=!l.pinned; saveState();
}
function moveListInOrder(id,beforeId){
  const arr=state.listOrder;
  const idx=arr.indexOf(id); if(idx===-1) return;
  arr.splice(idx,1);
  if(beforeId && beforeId!==id){
    const bi=arr.indexOf(beforeId);
    arr.splice(bi===-1?arr.length:bi,0,id);
  }else{
    arr.push(id);
  }
  saveState();
}
function getOrderedLists(){
  const pinned=[], unpinned=[];
  state.listOrder.forEach(id=>{
    const l=state.lists[id]; if(!l) return;
    (l.pinned?pinned:unpinned).push(l);
  });
  return pinned.concat(unpinned);
}
async function copyListId(listId){
  try{ await navigator.clipboard.writeText(listId); }
  catch(e){ alert('无法复制到剪贴板（可能是浏览器权限限制）'); }
}
async function pasteTaskIdToList(listId){
  try{
    const text=(await navigator.clipboard.readText()).trim();
    if(!text || !state.items[text]){ alert('剪贴板内容不是有效的任务 ID'); return; }
    addItemToList(text,listId);
    renderAll();
  }catch(e){ alert('无法读取剪贴板（可能是浏览器权限限制）'); }
}
function jumpToList(listId){
  state.ui.side='back';
  saveState();
  renderAll();
  requestAnimationFrame(()=>{
    const cardEl=document.querySelector(`.list-card[data-list-id="${listId}"]`);
    if(cardEl){
      cardEl.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
      cardEl.classList.add('flash-highlight');
      cardEl.addEventListener('animationend',()=>cardEl.classList.remove('flash-highlight'),{once:true});
    }
  });
}
function handleHashClick(itemId,anchorEl){
  const lists=getListsForItem(state.items[itemId]);
  if(lists.length===0) return;
  if(lists.length===1){ jumpToList(lists[0].id); }

function openListChooserMenu(lists,anchorEl){
  if(mobileMode){
    closeItemMenu();

      lists.forEach(l=>{
        const mi=document.createElement('div'); mi.className='mi'; mi.textContent=l.name;
        mi.onclick=()=>{ closeBottomSheet(); jumpToList(l.id); };
        sheet.appendChild(mi);
      });

    mi.onclick=()=>{ closeItemMenu(); jumpToList(l.id); };
    menu.appendChild(mi);
  });
  document.body.appendChild(menu);
  openMenuEl=menu;
  anchorEl.classList.add('open');
}

function hexToRgba(hex,alpha){
  const [r,g,b]=hexToRgbArr(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}
function hexToRgbArr(hex){
  const m=(hex||'#000000').replace('#','');
  const full = m.length===3 ? m.split('').map(c=>c+c).join('') : m;
  return [parseInt(full.slice(0,2),16)||0,parseInt(full.slice(2,4),16)||0,parseInt(full.slice(4,6),16)||0];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function darkenHex(hex,amt){
  const [r,g,b]=hexToRgbArr(hex);
  return rgbToHex(r*(1-amt),g*(1-amt),b*(1-amt));
}
function mixHex(hexA,hexB,ratio){
  const a=hexToRgbArr(hexA), b=hexToRgbArr(hexB);
  return rgbToHex(a[0]+(b[0]-a[0])*ratio, a[1]+(b[1]-a[1])*ratio, a[2]+(b[2]-a[2])*ratio);
}
function relLuminance(hex){
  const rgb=hexToRgbArr(hex).map(v=>v/255).map(c=> c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4));
  return 0.2126*rgb[0]+0.7152*rgb[1]+0.0722*rgb[2];
}
function contrastColor(hex){
  return relLuminance(hex)>0.55 ? '#111111' : '#ffffff';
}
function applyTheme(){
  const s=state.settings;
  const bg=s.bgColor||'#f2f2f2';
  const fg=s.fgColor||'#222222';
  const accent=s.accentColor||'#4a7fe8';
  const opacity=s.highlightOpacity!=null?s.highlightOpacity:0.16;
  const shadow=darkenHex(bg,0.13);
  const border=mixHex(bg,fg,0.22);
  const muted=mixHex(bg,fg,0.55);
  const root=document.documentElement.style;
  root.setProperty('--bg',bg);
  root.setProperty('--text',fg);
  root.setProperty('--border',border);
  root.setProperty('--muted',muted);
  root.setProperty('--accent',accent);
  root.setProperty('--accent-contrast',contrastColor(accent));
  root.setProperty('--accent-faint',hexToRgba(accent,opacity));
  root.setProperty('--accent-faint2',hexToRgba(accent,opacity/2));
  root.setProperty('--shadow',shadow);
  root.setProperty('--shadow-a',hexToRgba(shadow,0.55));
}

function findSlotForTime(time){
  return state.settings.daySlots.findIndex(s=> time>=s.start && time<s.end);
}
function createItemSmart(anchorBase,title,time,type){
  let level=anchorBase.level, date=anchorBase.date, slotIndex=anchorBase.slotIndex;
  if(level==='day' && time){
    const slot=findSlotForTime(time);
    if(slot!==-1){ level='slot'; slotIndex=slot; }
  }
  return addItem({title,type:type||'task',level,date,slotIndex,time});
}

/* =========================================================
   积压计算
========================================================= */
function getDayBacklog(){
  const tk=todayKey(); const ws=state.settings.weekStart;
  const weekStartKey=getWeekStartKey(tk,ws);
  return Object.values(state.items).filter(it=>{
    if(!isPending(it))return false;
    if(it.anchor.level!=='slot'&&it.anchor.level!=='day')return false;
    return it.anchor.date>=weekStartKey && it.anchor.date<tk;
  });
}
function getWeekBacklog(){
  const tk=todayKey(); const ws=state.settings.weekStart;
  const thisWeekStart=getWeekStartKey(tk,ws);
  const thisMonthFirst=monthKeyOf(tk)+'-01';
  return Object.values(state.items).filter(it=>{
    if(!isPending(it))return false;
    if(it.anchor.level==='month'||it.anchor.level==='year'||it.anchor.level==='life'||it.anchor.level==='someday')return false;
    const itemWeekStart=getWeekStartKey(it.anchor.date,ws);
    return itemWeekStart<thisWeekStart && itemWeekStart>=thisMonthFirst;
  });
}
function getMonthBacklog(){
  const tk=todayKey();
  const thisMonthKey=monthKeyOf(tk);
  const thisYearFirstMonth=yearKeyOf(tk)+'-01';
  return Object.values(state.items).filter(it=>{
    if(!isPending(it))return false;
    if(it.anchor.level==='year'||it.anchor.level==='life'||it.anchor.level==='someday')return false;
    let itemMonthKey = it.anchor.level==='month' ? it.anchor.date : monthKeyOf(it.anchor.date);
    return itemMonthKey<thisMonthKey && itemMonthKey>=thisYearFirstMonth;
  });
}
function getYearBacklog(){
  const thisYearKey=yearKeyOf(todayKey());
  return Object.values(state.items).filter(it=>{
    if(!isPending(it))return false;
    if(it.anchor.level==='life'||it.anchor.level==='someday')return false;
    let itemYearKey = it.anchor.level==='year' ? it.anchor.date : yearKeyOf(it.anchor.level==='month'?(it.anchor.date+'-01'):it.anchor.date);
    return itemYearKey<thisYearKey;
  });
}

/* 轻量 inline markdown：粗体/斜体/高亮/链接，不支持块级格式 */
function escapeHtml(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderInlineMarkdown(text){
  let s=escapeHtml(text);
  s=s.replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  s=s.replace(/\*\*([^\n*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/__([^\n_]+)__/g,'<strong>$1</strong>');
  s=s.replace(/==([^\n=]+)==/g,'<mark>$1</mark>');
  s=s.replace(/(^|[^*])\*([^\n*]+)\*(?!\*)/g,'$1<em>$2</em>');
  s=s.replace(/(^|[^_])_([^\n_]+)_(?!_)/g,'$1<em>$2</em>');
  s=s.replace(/\n/g,'<br>');
  return s;
}
function formatTime(hhmm){
  if(!hhmm) return '';
  if((state.settings.timeFormat||'24')==='24') return hhmm;
  let [h,m]=hhmm.split(':').map(Number);
  const ampm = h>=12 ? 'PM' : 'AM';
  let h12 = h%12; if(h12===0) h12=12;
  return `${h12}:${pad2(m)} ${ampm}`;
}
function anchorDateLabel(it){
  const a=it.anchor;
  if(a.level==='slot'||a.level==='day') return fmtMD(a.date);
  if(a.level==='week') return fmtMD(a.date)+'周';
  if(a.level==='month') return fmtYM(a.date);
  if(a.level==='year') return a.date+'年';
  return '';
}

/* 拖拽：整个格子(.cell / .currentperiod)都是拖放目标；shift+拖拽到空白=复制为子任务，
   shift+拖拽到某个已有任务上=建立父子关系；普通拖拽=移动（改锚点） */
const sortableInstances=[];
function makeDropZone(el,anchorBase){
  el.dataset.dzLevel=anchorBase.level;
  el.dataset.dzDate=anchorBase.date==null?'':anchorBase.date;
  el.dataset.dzSlot=anchorBase.slotIndex==null?'':anchorBase.slotIndex;
  const s=Sortable.create(el,{
    group:'dwmy',
    animation:150,
    sort:false,
    filter:'.cell-label,.cell-blank,.inline-create',
    preventOnFilter:false,
    onEnd:function(evt){
      const id=evt.item.dataset.id; if(!id) return;
      const target=evt.to;
      const oe=evt.originalEvent;
      const shift=!!(oe && oe.shiftKey);
      const patch={
        level: target.dataset.dzLevel,
        date: target.dataset.dzDate===''?null:target.dataset.dzDate,
        slotIndex: target.dataset.dzSlot===''?null:Number(target.dataset.dzSlot)
      };
      let landedItemId=null;
      if(oe){
        const px = oe.clientX!=null ? oe.clientX : (oe.changedTouches && oe.changedTouches[0] && oe.changedTouches[0].clientX);
        const py = oe.clientY!=null ? oe.clientY : (oe.changedTouches && oe.changedTouches[0] && oe.changedTouches[0].clientY);
        if(px!=null && py!=null){
          const under=document.elementFromPoint(px,py);
          const itemEl=under && under.closest('.item');
          if(itemEl && itemEl!==evt.item && itemEl.dataset.id) landedItemId=itemEl.dataset.id;
        }
      }
      if(shift){
        if(landedItemId){
          const ok=setParent(id,landedItemId);
          if(!ok) alert('无法关联：会形成循环引用');
        }else{
          copyAsChild(id,patch);
        }
      }else{
        moveItemToAnchor(id,patch);
      }
      renderAll();
    }
  });
  sortableInstances.push(s);
}
function destroySortables(){
  sortableInstances.forEach(s=>{ try{s.destroy();}catch(e){} });
  sortableInstances.length=0;
}

    <input type="time" class="ic-time" style="display:none;">
  `;
  const blank=itemsEl.querySelector('.cell-blank');
  itemsEl.insertBefore(row, blank);
  if(window.lucide) lucide.createIcons();
  const titleInp=row.querySelector('.ic-title');
  const timeBtn=row.querySelector('.ic-time-btn');
  const timeInp=row.querySelector('.ic-time');
  let committed=false;
  timeBtn.onclick=(e)=>{
    e.stopPropagation();
    timeInp.style.display = timeInp.style.display==='none' ? 'inline-block' : 'none';
    if(timeInp.style.display!=='none') timeInp.focus(); else titleInp.focus();
  };
  function commit(){
    if(committed) return; committed=true;
    const title=titleInp.value.trim();
    if(title){
      const newId=createItemSmart(anchorBase,title,timeInp.value||null);
      if(opts.afterCreate) opts.afterCreate(newId);
    }
    renderAll();
  }
  titleInp.addEventListener('input',()=>autoResizeTextarea(titleInp));
  titleInp.addEventListener('keydown',(e)=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); commit(); }
    else if(e.key==='Escape'){ committed=true; row.remove(); }
  });
  timeInp.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){ e.preventDefault(); commit(); }
  });
  titleInp.addEventListener('blur',()=>{
    setTimeout(()=>{
      if(committed) return;
      if(document.activeElement===timeInp || document.activeElement===timeBtn) return;
      commit();
    },150);
  });
  autoResizeTextarea(titleInp);
  titleInp.focus();
}

function renderBacklog(container,items){
  container.innerHTML='';
  if(items.length===0){ container.classList.add('empty'); return; }
  container.classList.remove('empty');
  const label=document.createElement('div'); label.className='backlog-label'; label.textContent='积压 · '+items.length;
  container.appendChild(label);

/* 生成一个"行"：整个 cell 本身就是可拖放/可点击新建的区域；label 若给了 onLabelClick 则可点击跳转 */
function buildRow({label,anchorBase,items,current,weekBoundary,showDate,onLabelClick}){
  const cell=document.createElement('div'); cell.className='cell'+(current?' current':'')+(weekBoundary?' week-boundary':'');
  if(label!=null){
    const lab=document.createElement('div'); lab.className='cell-label'; lab.textContent=label;
    if(onLabelClick){
      lab.classList.add('clickable');
      lab.onclick=(e)=>{ e.stopPropagation(); onLabelClick(); };
    }
    cell.appendChild(lab);
  }
  renderItemList(cell,items,{showDate:!!showDate});
  attachCreate(cell,anchorBase);
  makeDropZone(cell,anchorBase);
  return cell;
}
/* 让某一列跳转到指定时间点，并把该列滚动到可见范围 */
function jumpColumnTo(colId,key){
  const f=state.ui.focus;
  if(colId==='day') f.day=key;
  else if(colId==='week') f.week=key;
  else if(colId==='month') f.month=key;
  else if(colId==='year') f.year=key;
  else return;
  saveState(); renderAll();
  requestAnimationFrame(()=>{
    const colEl=document.querySelector(`.column[data-col="${colId}"]`);
    if(colEl) colEl.scrollIntoView({behavior:'smooth',inline:'nearest',block:'nearest'});
  });
}
/* 空白格默认高度=容器高度/格子数；内容较多的格子自然撑高，其它格子保持默认高度，
   整个 cell-list 变为可滚动（滚动条已在CSS里隐藏） */
function equalizeRows(listEl){
  const rows=Array.from(listEl.children).filter(c=>c.classList.contains('cell'));
  if(rows.length===0) return;
  const pct=(100/rows.length)+'%';
  rows.forEach(r=>{ r.style.minHeight=pct; });
}

function buildWeeksMatrix(monthKey,weekStart){
  const first=monthKey+'-01';
  const last=monthKey+'-'+pad2(daysInMonth(monthKey));
  let cursor=getWeekStartKey(first,weekStart);
  const lastWeekStart=getWeekStartKey(last,weekStart);
  const weeks=[];
  while(cursor<=lastWeekStart){
    const days=[]; for(let i=0;i<7;i++) days.push(addDays(cursor,i));
    weeks.push({weekStart:cursor,days});
    cursor=addDays(cursor,7);
  }
  return weeks;
}

function openListSearchModal(listId){
  const mask=document.createElement('div'); mask.className='modal-mask';
  const modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML=`
    <h3>搜索任务加入 list</h3>
    <div class="row"><input id="searchInput" type="text" placeholder="输入关键词搜索标题" style="flex:1 1 auto;"></div>
    <div id="searchResults" class="search-results"></div>
    <div class="actions">
      <button id="searchCancel">关闭</button>
      <button id="searchAdd" class="primary">加入所选</button>
    </div>
  `;
  mask.appendChild(modal); document.body.appendChild(mask);
  const $=(sel)=>modal.querySelector(sel);
  const input=$('#searchInput');
  const resultsEl=$('#searchResults');
  const selected=new Set();

  function renderResults(){
    const q=input.value.trim().toLowerCase();
    resultsEl.innerHTML='';
    if(!q) return;
    const matches=Object.values(state.items).filter(it=>it.title.toLowerCase().includes(q)).slice(0,50);
    matches.forEach(it=>{
      const row=document.createElement('label'); row.className='search-result-row';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=selected.has(it.id);
      cb.onchange=()=>{ if(cb.checked) selected.add(it.id); else selected.delete(it.id); };
      row.appendChild(cb);
      const span=document.createElement('span'); span.textContent=it.title;
      row.appendChild(span);
      resultsEl.appendChild(row);
    });
  }
  input.addEventListener('input',renderResults);
  $('#searchCancel').onclick=()=>mask.remove();
  mask.addEventListener('click',(e)=>{ if(e.target===mask) mask.remove(); });
  $('#searchAdd').onclick=()=>{
    selected.forEach(id=>addItemToList(id,listId));
    mask.remove();
    renderAll();
  };
  input.focus();
}

/* 简化版瀑布流：用"list里任务数量"估算高度，把list依次分配到当前最短的列 */
function estimateListHeight(list){
  const HEADER=28, ROW=22, PAD=8;
  const count = list.isAddButton ? 0 : getItemsForList(list.id).length;
  if(list.isAddButton) return 26;
  return HEADER + Math.max(count,0)*ROW + PAD;
}
function layoutMasonry(flowItems,colCount){
  const heights=new Array(colCount).fill(0);
  const columns=Array.from({length:colCount},()=>[]);
  flowItems.forEach(item=>{
    let minIdx=0;
    for(let i=1;i<colCount;i++) if(heights[i]<heights[minIdx]) minIdx=i;
    columns[minIdx].push(item);
    heights[minIdx]+=estimateListHeight(item);
  });
  return columns;
}
function setupListSortable(colEl){
  const s=Sortable.create(colEl,{
    group:'dwmy-lists',
    animation:150,
    handle:'.list-card-header',
    draggable:'.list-card',
    filter:'.add-list-btn',
    preventOnFilter:false,
    onEnd:function(evt){
      const id=evt.item.dataset.listId; if(!id) return;
      const nextEl=evt.item.nextElementSibling;
      const beforeId = nextEl && nextEl.classList.contains('list-card') ? nextEl.dataset.listId : null;
      moveListInOrder(id,beforeId);
      renderAll();
    }
  });
  sortableInstances.push(s);
}

/* list/Someday 内部的 item 拖拽：shift+落在某任务上=建立子任务关系；
   shift+落在空白=复制为子任务并加入该list；普通拖拽=在list/Someday之间移动归属 */
function makeListItemDropZone(el,context){
  el.dataset.dzType = context.type;
  el.dataset.dzListId = context.type==='list' ? context.listId : '';
  const s=Sortable.create(el,{
    group:'dwmy-back-items',
    animation:150,
    sort:false,
    filter:'.cell-blank,.inline-create',
    preventOnFilter:false,
    onEnd:function(evt){
      const id=evt.item.dataset.id; if(!id) return;
      const target=evt.to; const from=evt.from;
      const oe=evt.originalEvent;
      const shift=!!(oe && oe.shiftKey);
      let landedItemId=null;
      if(oe){
        const px = oe.clientX!=null ? oe.clientX : (oe.changedTouches && oe.changedTouches[0] && oe.changedTouches[0].clientX);
        const py = oe.clientY!=null ? oe.clientY : (oe.changedTouches && oe.changedTouches[0] && oe.changedTouches[0].clientY);
        if(px!=null && py!=null){
          const under=document.elementFromPoint(px,py);
          const itemEl=under && under.closest('.item');
          if(itemEl && itemEl!==evt.item && itemEl.dataset.id) landedItemId=itemEl.dataset.id;
        }
      }
      const targetListId = target.dataset.dzListId || null;
      const fromListId = from.dataset.dzListId || null;

      if(shift){
        if(landedItemId){
          const ok=setParent(id,landedItemId);
          if(!ok) alert('无法关联：会形成循环引用');
        }else{
          const newId=copyAsChild(id,{level:'someday',date:null,slotIndex:null,time:null});
          if(targetListId) addItemToList(newId,targetListId);
        }
      }else{
        if(fromListId && fromListId!==targetListId) removeItemFromList(id,fromListId);
        if(targetListId && targetListId!==fromListId) addItemToList(id,targetListId);
      }
      renderAll();
    }
  });
  sortableInstances.push(s);
}

function renderBackSide(app){
  const somedayCol=document.createElement('div'); somedayCol.className='column someday-col'; somedayCol.dataset.col='someday';
  renderSomedayColumn(somedayCol);
  app.appendChild(somedayCol);

  const ordered=getOrderedLists();
  const flowItems=ordered.concat([{isAddButton:true}]);
  const COLS=mobileMode?1:4;
  const columns=layoutMasonry(flowItems,COLS);
  columns.forEach(colItems=>{
    const colEl=document.createElement('div'); colEl.className='masonry-col';
    colItems.forEach(it=>{
      if(it.isAddButton){
        const addBtn=document.createElement('button'); addBtn.type='button'; addBtn.className='add-list-btn';
        addBtn.textContent='+ 新建 list';
        addBtn.onclick=()=>{
          const newId=createList('新建列表');
          renderAll();
          requestAnimationFrame(()=>{
            const el=document.querySelector(`.list-card[data-list-id="${newId}"] .list-name`);
            if(el) startRenameList(newId,el);
          });
        };
        colEl.appendChild(addBtn);
      }else{
        colEl.appendChild(renderListCard(it));
      }
    });
    app.appendChild(colEl);
    setupListSortable(colEl);
  });
}

/* =========================================================
   列导航
========================================================= */
function navigate(colId,dir){
  const f=state.ui.focus;
  if(colId==='day') f.day=addDays(f.day,dir);
  else if(colId==='week') f.week=addDays(f.week,dir*7);
  else if(colId==='month') f.month=addMonths(f.month,dir);
  else if(colId==='year') f.year=String(Number(f.year)+dir);
  else if(colId==='life') f.life=String(Number(f.life)+dir);
  saveState(); renderAll();
}
function jumpToday(colId){
  const f=state.ui.focus; const tk=todayKey();
  if(colId==='day') f.day=tk;
  else if(colId==='week') f.week=tk;
  else if(colId==='month') f.month=monthKeyOf(tk);
  else if(colId==='year') f.year=yearKeyOf(tk);
  else if(colId==='life') f.life=yearKeyOf(tk);
  saveState(); renderAll();
}
function alignAll(colId){
  const f=state.ui.focus; const ws=state.settings.weekStart;
  let anchorDate;
  if(colId==='day') anchorDate=f.day;
  else if(colId==='week') anchorDate=f.week;
  else if(colId==='month') anchorDate=f.month+'-01';
  else if(colId==='year') anchorDate=f.year+'-01-01';
  else if(colId==='life') anchorDate=f.life+'-01-01';

  if(colId!=='day') f.day=anchorDate.length===10?anchorDate:f.day;
  if(colId!=='week') f.week=getWeekStartKey(anchorDate.length===10?anchorDate:f.day,ws);
  if(colId!=='month') f.month=monthKeyOf(anchorDate.length>=7?anchorDate:f.month+'-01');
  if(colId!=='year') f.year=yearKeyOf(anchorDate);
  if(colId!=='life') f.life=yearKeyOf(anchorDate);
  saveState(); renderAll();
}

/* =========================================================
   设置 Modal
========================================================= */
function openSettingsModal(){
  const mask=document.createElement('div'); mask.className='modal-mask';
  const modal=document.createElement('div'); modal.className='modal';
  const s=state.settings;
  const pending={ bgColor:s.bgColor||'#f2f2f2', fgColor:s.fgColor||'#222222', accentColor:s.accentColor||'#4a7fe8' };

  modal.innerHTML=`
    <h3>设置</h3>
    <div class="row"><label>周起始</label>
      <select id="stWeekStart"><option value="1">周一</option><option value="0">周日</option></select>
    </div>
    <div class="row"><label>Month视图</label>
      <select id="stMonthView"><option value="day">日视图</option><option value="week">周视图</option></select>
    </div>
    <div class="row"><label>高亮强度</label><input id="stHighlight" type="range" min="0.05" max="0.5" step="0.01"></div>
    <div class="row"><label>时间格式</label>
      <select id="stTimeFormat"><option value="24">24小时制</option><option value="12">12小时制（AM/PM）</option></select>
    </div>
    <h3 style="margin-top:14px;">主题</h3>
    <div class="row"><label>背景色</label><button type="button" id="pkBg" class="color-swatch"></button></div>
    <div class="row"><label>文字色</label><button type="button" id="pkFg" class="color-swatch"></button></div>
    <div class="row"><label>重点色</label><button type="button" id="pkAccent" class="color-swatch"></button></div>
    <div class="theme-io-row">
      <i data-lucide="hash"></i>
      <button type="button" id="themeCopyHex">Copy as hex</button>
      <button type="button" id="themePasteHex">Paste as hex</button>
    </div>
    <div class="theme-io-row">
      <i data-lucide="swatch-book"></i>
      <button type="button" id="themeCopySvg">Copy as svg</button>
      <button type="button" id="themePasteSvg">Paste as svg</button>
    </div>
    <h3 style="margin-top:14px;">GitHub 同步</h3>
    <div id="ghSyncSection"></div>
    <h3 style="margin-top:14px;">时段设置</h3>
    <div class="settings-grid" id="stSlots"></div>
    <div class="actions">
      <button id="stCancel">取消</button>
      <button id="stSave" class="primary">保存</button>
    </div>
  `;
  mask.appendChild(modal); document.body.appendChild(mask);
  if(window.lucide) lucide.createIcons();
  const $=(sel)=>modal.querySelector(sel);
  renderGhSyncSection($('#ghSyncSection'));
  $('#stWeekStart').value=String(s.weekStart);
  $('#stMonthView').value=s.monthView;
  $('#stHighlight').value=s.highlightOpacity!=null?s.highlightOpacity:0.16;
  $('#stTimeFormat').value=s.timeFormat||'24';

  function previewTheme(){
    const bak=state.settings;
    state.settings=Object.assign({},bak,pending,{highlightOpacity:Number($('#stHighlight').value)});
    applyTheme();
    state.settings=bak;
  }

  const pickrs=[];
  function makePickr(elSel,initial,onPick){
    const p=Pickr.create({
      el:elSel, theme:'nano', default:initial,
      components:{preview:true,opacity:false,hue:true,interaction:{hex:true,input:true,clear:false,save:true}}
    });
    p.on('change',(color)=>{
      onPick(color.toHEXA().toString());
      p.applyColor(true); // 立刻刷新触发按钮上显示的色块，不等点"保存"
      previewTheme();
    });
    p.on('save',()=>p.hide());
    pickrs.push(p);
    return p;
  }
  const pickrBg=makePickr('#pkBg',pending.bgColor,(hex)=>{ pending.bgColor=hex; });
  const pickrFg=makePickr('#pkFg',pending.fgColor,(hex)=>{ pending.fgColor=hex; });
  const pickrAccent=makePickr('#pkAccent',pending.accentColor,(hex)=>{ pending.accentColor=hex; });
  $('#stHighlight').addEventListener('input',previewTheme);

  function applyPastedColors(bg,fg,accent){
    if(bg){ pending.bgColor=bg; pickrBg.setColor(bg); pickrBg.applyColor(true); }
    if(fg){ pending.fgColor=fg; pickrFg.setColor(fg); pickrFg.applyColor(true); }
    if(accent){ pending.accentColor=accent; pickrAccent.setColor(accent); pickrAccent.applyColor(true); }
    previewTheme();
  }
  function themeToHexString(){
    return `${pending.bgColor} ${pending.fgColor} ${pending.accentColor}`;
  }
  function themeToSvgString(){
    return `<svg width="96px" height="32px" xmlns="http://www.w3.org/2000/svg" baseProfile="full" version="1.1">
  <circle cx='16' cy='16' r='16' id='bg' fill='${pending.bgColor}'></circle>
  <circle cx='48' cy='16' r='16' id='fg' fill='${pending.fgColor}'></circle>
  <circle cx='80' cy='16' r='16' id='accent' fill='${pending.accentColor}'></circle>
</svg>`;
  }
  function extractSvgColor(svgText,id){
    let m=svgText.match(new RegExp(`id=['"]${id}['"][^>]*fill=['"]([^'"]+)['"]`));
    if(m) return m[1];
    m=svgText.match(new RegExp(`fill=['"]([^'"]+)['"][^>]*id=['"]${id}['"]`));
    return m ? m[1] : null;
  }
  $('#themeCopyHex').onclick=async ()=>{
    try{ await navigator.clipboard.writeText(themeToHexString()); }
    catch(e){ alert('无法复制到剪贴板（可能是浏览器权限限制）'); }
  };
  $('#themePasteHex').onclick=async ()=>{
    try{
      const text=(await navigator.clipboard.readText()).trim();
      const parts=text.split(/\s+/).filter(Boolean);
      const hexRe=/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;
      if(parts.length!==3 || !parts.every(p=>hexRe.test(p))){
        alert('剪贴板内容格式不对，需要是 3 个用空格分隔的 hex 颜色（背景 文字 重点色）');
        return;
      }
      applyPastedColors(parts[0],parts[1],parts[2]);
    }catch(e){ alert('无法读取剪贴板（可能是浏览器权限限制）'); }
  };
  $('#themeCopySvg').onclick=async ()=>{
    try{ await navigator.clipboard.writeText(themeToSvgString()); }
    catch(e){ alert('无法复制到剪贴板（可能是浏览器权限限制）'); }
  };
  $('#themePasteSvg').onclick=async ()=>{
    try{
      const text=await navigator.clipboard.readText();
      const bg=extractSvgColor(text,'bg'), fg=extractSvgColor(text,'fg'), accent=extractSvgColor(text,'accent');
      if(!bg||!fg||!accent){
        alert('剪贴板内容不是有效的主题 SVG（需要包含 id="bg"/"fg"/"accent" 的 fill 颜色）');
        return;
      }
      applyPastedColors(bg,fg,accent);
    }catch(e){ alert('无法读取剪贴板（可能是浏览器权限限制）'); }
  };

  function cleanup(){ pickrs.forEach(p=>{ try{p.destroyAndRemove();}catch(e){} }); }
  function cancel(){ cleanup(); mask.remove(); applyTheme(); }

  const slotsWrap=$('#stSlots');
  s.daySlots.forEach((slot,i)=>{
    slotsWrap.innerHTML+=`
      <input data-i="${i}" data-f="name" value="${slot.name}">
      <input data-i="${i}" data-f="start" type="time" value="${slot.start}">
      <input data-i="${i}" data-f="end" type="time" value="${slot.end}">
    `;
  });

  $('#stCancel').onclick=cancel;
  mask.addEventListener('click',(e)=>{ if(e.target===mask) cancel(); });
  $('#stSave').onclick=()=>{
    s.weekStart=Number($('#stWeekStart').value);
    s.monthView=$('#stMonthView').value;
    s.bgColor=pending.bgColor;
    s.fgColor=pending.fgColor;
    s.accentColor=pending.accentColor;
    s.highlightOpacity=Number($('#stHighlight').value);
    s.timeFormat=$('#stTimeFormat').value;
    slotsWrap.querySelectorAll('input').forEach(inp=>{
      s.daySlots[Number(inp.dataset.i)][inp.dataset.f]=inp.value;
    });
    cleanup();
    applyTheme();
    saveState(); mask.remove(); renderAll();
  };
}

/* =========================================================
   导入导出
========================================================= */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='dwmy-export-'+todayKey()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importData(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      if(!parsed.items || !parsed.settings){ alert('文件格式不正确'); return; }
      state=parsed;
      migrateState(state);
      applyTheme();
      saveState(); renderAll();
    }catch(e){ alert('导入失败：'+e.message); }
  };
  reader.readAsText(file);
}

/* =========================================================
   总渲染入口
========================================================= */
const COLUMN_RENDERERS={ day:renderDayColumn, week:renderWeekColumn, month:renderMonthColumn, year:renderYearColumn, life:renderLifeColumn };
const COLUMN_ORDER=['day','week','month','year','life'];

function renderAll(){
  updateMobileClass();
  closeItemMenu();
  destroySortables();
  const app=document.getElementById('app');
  const scrollX=app.scrollLeft;
  app.innerHTML='';
  if(state.ui.side==='back'){
    renderBackSide(app);
  }else{
    COLUMN_ORDER.forEach(colId=>{
      const col=document.createElement('div'); col.className='column'; col.dataset.col=colId;
      app.appendChild(col);
      COLUMN_RENDERERS[colId](col);
    });
  }
  app.scrollLeft=scrollX;
  renderBottomBar();
  updateTopbarSyncButton();
  if(window.lucide) lucide.createIcons();
  refreshOpenSubtaskPanel();
}
function toggleSide(){
  closeSubtaskPanel();
  state.ui.side = state.ui.side==='back' ? 'front' : 'back';
  saveState();
  renderAll();
}
